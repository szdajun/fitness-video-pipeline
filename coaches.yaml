# 郭海军 — 老教练
# 风格：资深领操，动作干净有力，节奏感强，团队经验丰富
郭海军:
  nickname: 老教练
  判词: 海军沉稳领操行，步履矫健韵自成，指挥若定风采在，团队跟随步步赢
  特点:
    - 资深老教练
    - 动作干净有力
    - 节奏感强
    - 团队经验丰富

# 枫林红 — 新教练
# 风格：新人领操，活力充沛，动作新颖，带给团队新气象
枫林红:
