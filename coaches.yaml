# 教练风格判词

# 艳青 — 胭脂虎
# 风格：动作力度大，刚柔并济，女性柔美中带阳刚气质
艳青:
  nickname: 胭脂虎
  判词: 踏步如虎啸，纤腰扭似涛，酥胸随韵起，刚柔胭脂虎
  特点:
    - 力度强劲
    - 腰臀线条突出
    - 柔中带刚

# 丽丽 — 腰女
# 风格：腰细腿长，身材极好，柔美中渐显力度
丽丽:
  nickname: 腰女
  判词: 腰细若柳摇金殿，腿长随风步步轻，柔姿渐起刚骨架，丽影无双醉银屏
  特点:
    - 腰细腿长
    - 身姿柔美
    - 力度渐强

# 建玲 — 三宝妈
