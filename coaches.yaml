  判词: 时代广场行将令，帅哥美女齐上阵，吉祥三宝福在手，岁月不催韵犹在
  特点:
    - 三孩母亲
    - 带操利落
    - 团队领袖
    - 身材不老

# 小红豆 — 红娘子
# 风格：娇小可爱女人味足，动作标准，香汗淋漓花枝乱颤，娇喘微微惹人怜
小红豆:
