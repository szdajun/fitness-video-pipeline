# 教练风格判词

# 艳青 — 胭脂虎
# 风格：动作力度大，刚柔并济，女性柔美中带阳刚气质
艳青:
  nickname: 胭脂虎
  判词: 踏步如虎啸，纤腰扭似涛，酥胸随韵起，刚柔胭脂虎
  特点:
    - 力度强劲
    - 腰臀线条突出
    - 柔中带刚

# 丽丽 — 腰女
# 风格：腰细腿长，身材极好，柔美中渐显力度
丽丽:
  nickname: 腰女
  判词: 腰细若柳摇金殿，腿长随风步步轻，柔姿渐起刚骨架，丽影无双醉银屏
  特点:
    - 腰细腿长
    - 身姿柔美
    - 力度渐强

# 建玲 — 带队大姐
# 风格：三宝妈，40+，带操干脆利落，身材保持好，团队核心领袖
建玲:
  nickname: 带队大姐
  判词: 时代广场行将令，帅哥美女齐上阵，吉祥三宝福在手，岁月不催韵犹在
  特点:
    - 三孩母亲
    - 带操利落
    - 团队领袖
    - 身材不老

# 小红豆 — 妙女
# 风格：娇小可爱女人味足，动作标准，香汗淋漓花枝乱颤，娇喘微微惹人怜
小红豆:
  nickname: 妙女
  判词: 红豆香汗透罗裳，花枝乱颤舞红妆，娇喘微微惹人怜，酥胸玉臂醉银屏
  特点:
    - 娇小可爱
    - 女人味足
