# 郭海军 — 老兵不老
# 风格：退伍老兵，动作刚劲有力，作风硬朗，老当益壮
郭海军:
  nickname: 老兵不老
  判词: 老兵卸甲不卸魂，铁骨铮铮踏乐行，岁月不磨豪迈气，操场点兵谁与争
  特点:
    - 退伍军人
    - 动作刚劲有力
    - 作风硬朗
    - 老当益壮

# 枫林红 — 霸道总裁
# 风格：气场强大，动作利落干练，霸气十足又不失女人味
枫林红:
