# 性感风格横屏版 (16:9)
body_warp: false

color_grade:
  brightness: 5
  contrast: 1.05
  saturation: 1.05
  warmth: 3
  clahe: true
  sharpen: 1.5                # color 锐化，拉升前增强细节
  temporal_smooth: 0.25
  adaptive_contrast: 0.3
  face_sharpen: 3.0           # 脸部放大增强（截取→2x放大→CLAHE+锐化→缩小混合）
  vignette_strength: 0.25    # 暗角强度
  vignette_radius: 0.8
  vignette_feather: 0.35
  film_grain_strength: 0.015 # 胶片颗粒
  film_grain_size: 2
  lut_preset: cinematic
  lut_intensity: 0.7

  # ---- 夜景高光三层处理（夜景广场健身场景） ----
  highlight_protect: 0.25
  highlight_threshold: 185
  highlight_blur: 5

  white_protect: 0.15
  white_value_threshold: 200
  white_sat_threshold: 60
  white_protect_blur: 5

  light_region_protect: 0.12
  light_region_threshold: 235
  light_region_min_area: 2500
  light_region_blur: 21

skin_smooth:
  enabled: true
  strength: 0.35
  d: 9
  sigmaColor: 20
  sigmaSpace: 20
  downscale: 0.5
  skin_detect: true

ken_burns:
  mode: auto_track
  track_smooth_window: 20
  track_zoom_range: [1.0, 1.04]
  track_margin: 0.06

output:
  width: 1280
  height: 720
  crf: 18                   # 高质量编码
  audio_bitrate: 128k
  sharpen: 0.4              # 拉升后 unsharp 锐化，补偿放大模糊

stages:
  stabilize: false           # 关闭防抖（画面质量优先）
  h2v_convert: false
  body_warp: false
  ken_burns: true
  skin_smooth: false
  skin_tone_filter: false
  denoise: false            # 关闭降噪（源视频清晰，GaussianBlur 只会模糊画面）
  beat_flash: true
  highlight: true
  energy_bar: true
  intro_outro: true
  audio: true
  face_beautify: false
  face_beautify2: false

energy_bar:
  width: 32
  margin_right: 20
  margin_bottom: 80
  height: 250
  smoothing: 0.85
  min_fill_ratio: 0.15
  motion_scale: 200

intro_outro:
  intro_duration: 4.0
  outro_duration: 4.0
  channel_name: "胭脂虎健身团"
  cta_text: "关注不迷路"
  audio_fade_out: 3.0
  fade_in_seconds: 1.0
  fade_out_seconds: 1.5

audio:
  enabled: true
  target_lufs: -12.0
  fade_in: 0.5
  fade_out: 1.0
  denoise: 3                 # 音频降噪（环境噪音过滤）
  ducking: 0

denoise:
  denoise_strength: 3        # 视频降噪（手机暗光拍摄）
  denoise_mode: GaussianBlur

face_beautify:
  enabled: true
  eye_brighten: 0.5
  face_smooth: 0.35
  eye_radius: 22
  face_fill_light: 0.2
  workers: 4

face_beautify2:
  enabled: true
  skin_smooth: 0.3
  eye_brighten: 0.8
  face_whiten: 0.3
  face_slim: 0.15
  eye_enlarge: 0.1
  workers: 4
  detect_interval: 5          # 每5帧检测一次人脸，中间帧复用（CPU优化）

