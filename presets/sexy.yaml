# 性感风格横屏版 (16:9)
body_warp: false

color_grade:
  brightness: 5
  contrast: 1.05
  saturation: 1.05
  warmth: 3
  clahe: true
  sharpen: 0
  temporal_smooth: 0.25

skin_smooth:
  enabled: true
  strength: 0.3
  d: 7
  sigmaColor: 15
  sigmaSpace: 15
  downscale: 0.5

ken_burns:
  mode: dual
  dual_close_zoom: 1.2
  dual_close_zoom_v: 1.15
  dual_cycle_seconds: 8
  dual_pan_amplitude: 8
  dual_motion_response: 0.5
  dual_dwell: 0.3
  dual_motion_zoom_response: 0.3
  dual_sway_amp: 4
  dual_sway_freq: 1.6
  dual_sf_inertia: 0.06

output:
  width: 1920
  height: 1080
  crf: 22
  audio_bitrate: 128k

stages:
  stabilize: false
  h2v_convert: false
  body_warp: false
  ken_burns: true
  skin_smooth: true
  skin_tone_filter: false
  beat_flash: true
  highlight: true
  energy_bar: true
  intro_outro: true
  audio: true
  face_beautify: true
  face_beautify2: false

energy_bar:
  width: 32
  margin_right: 20
  margin_bottom: 60
  height: 400
  smoothing: 0.85
  min_fill_ratio: 0.15
  motion_scale: 200

intro_outro:
  intro_duration: 4.0
  outro_duration: 2.5
  channel_name: "胭脂虎健身团"
  cta_text: "关注不迷路"
  audio_fade_out: 3.0

audio:
  enabled: true
  target_lufs: -14.0
  fade_in: 0.5
  fade_out: 1.0
  denoise: 0
  ducking: 0

face_beautify:
  enabled: true
  eye_brighten: 0.5
  face_smooth: 0.35
  eye_radius: 22
  face_fill_light: 0.2

face_beautify2:
  enabled: false
  skin_smooth: 0.4
  eye_brighten: 0.5
  face_whiten: 0.15
  face_slim: 0.0
  eye_enlarge: 0.0
