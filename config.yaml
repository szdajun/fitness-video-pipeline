# 健身短视频处理流水线 — 默认配置
# 用法: python main.py input.mp4 -c config.yaml

stages:
  pose_detect: true
  stabilize: true           # 手机拍摄防抖
  h2v_convert: false
  body_warp: false
  ken_burns: true
  face_warp: false
  color_grade: true
  skin_tone_filter: false
  denoise: true             # 暗光/手机拍摄降噪
  audio: false
  skeleton_overlay: false
  person_count: false
  lead_box: false
  lead_ghost: false
  face_blur: false
  motion_heatmap: false
  sync_score: false
  beat_flash: true
  highlight: true
  energy_bar: true
  skin_smooth: true
  intro_outro: true
  watermark: false
  blush: false
  export: true

pose_backend: yolo
pose_model: yolov8n-pose

output:
  width: 1920
  height: 1080   # 横屏 16:9
  crf: 18        # 画质优先
  sharpen: 0     # 关闭全局锐化（避免放大压缩伪影）

color_grade:
  brightness: 0
  clahe: true
  sharpen: 0.3

ken_burns:
  mode: smooth
  zoom_range: [1.0, 1.03]

energy_bar:
  width: 16
  margin_right: 20
  margin_bottom: 60
  height: 300
  smoothing: 0.85
  min_fill_ratio: 0.15

denoise:
  denoise_strength: 3        # 轻微降噪，保留细节
  denoise_mode: fastNlMeans

stabilize:
  shakiness: 7              # 手机手持拍摄抖动较大
  accuracy: 15
  smoothing: 15

skin_smooth:
  enabled: true
  strength: 0.3
  d: 7
  sigmaColor: 15
  sigmaSpace: 15
  downscale: 0.5

