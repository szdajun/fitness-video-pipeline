# 健身短视频处理流水线 — 默认配置
# 用法: python main.py input.mp4 -c config.yaml

stages:
  pose_detect: true
  stabilize: false
  h2v_convert: false        # 横屏不做竖屏转换
  body_warp: false
  ken_burns: true            # 开启微缩放
  face_warp: false
  color_grade: true         # 开启光线调整(CLAHE)
  skin_tone_filter: false
  denoise: false
  audio: false
  skeleton_overlay: false
  person_count: false
  lead_box: false
  lead_ghost: false
  face_blur: false
  motion_heatmap: false
  sync_score: false
  beat_flash: true          # 开启节拍闪烁
  highlight: true           # 开启高光剪辑
  energy_bar: true          # 开启能量条
  skin_smooth: true
  intro_outro: true
  watermark: false
  blush: false
  export: true

pose_backend: yolo
pose_model: yolov8n-pose

output:
  width: 1920
  height: 1080   # 横屏 16:9
  crf: 18        # 画质优先

color_grade:
  brightness: 0
  clahe: true
  sharpen: 0.3

ken_burns:
  mode: smooth
  zoom_range: [1.0, 1.03]

energy_bar:
  width: 16
  margin_right: 20
  margin_bottom: 60
  height: 300
  smoothing: 0.85
  min_fill_ratio: 0.15

skin_smooth:
  enabled: true
  strength: 0.3
  d: 7
  sigmaColor: 15
  sigmaSpace: 15
  downscale: 0.5